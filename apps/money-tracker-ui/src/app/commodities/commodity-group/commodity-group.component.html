@if (entity) {
  <app-breadcrumbs [path]="path"></app-breadcrumbs>
}
@if (entity) {
  <div>
    <div class="back-area">
      <div class="jumbotron summary-header">

        <!-- Left Side: Title and Description -->
        <div class="summary-details">
          <h2 style="margin: 0; font-size: 1.75rem; font-weight: 600; color: #212529; letter-spacing: -0.2px;">
            {{ entity ? entity.name : '' }}
          </h2>
          @if (entity.description) {
            <div class="description-box">
              {{ entity.description }}
            </div>
          }
        </div>

        <!-- Right Side: Total Display -->
        <div class="summary-total">
          <span class="total-label">Total</span>
          <span class="total-amount">
            {{ expensesSum ? (expensesSum | currencySpace : 'RUB' :'symbol') : 'Loading...' }}
          </span>
        </div>

      </div>
    </div>

    <app-entity-list
      [searchRequest]="{
        queryArguments: getQueryArguments(),
        queryName: 'recursiveByParentId'
      }"
      (loading$)="setLoading($event)"
      (entitiesChange$)="setEntities($event)"
      [sort]="getSort()"
    ></app-entity-list>

    <app-commodity-group-commodities
      [id]="id"
    >
    </app-commodity-group-commodities>
  </div>
}
