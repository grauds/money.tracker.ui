<div>
  <div class="d-flex align-items: center; margin: 32px; padding-left: 12px; border-left: 4px solid #0d6efd;">
    <div>
      <h3 style="margin: 20px 0 0 20px; font-size: 1.25rem; font-weight: 600; color: #212529; letter-spacing: -0.2px;">
        Budget Balance Monthly
      </h3>
      <small style="margin: 0 0 0 20px; color: #6c757d; font-size: 0.85rem;">
        The balance of your monthly budget for the selected period with total savings amount.
      </small>
    </div>
  </div>

  <mat-paginator
    [length]="total"
    [pageSize]="limit"
    [pageSizeOptions]="[
      12, 24, 36, 42, 48, 54, 60, 72, 78, 84, 90, 102, 108, 120, 240, 360
    ]"
    [pageIndex]="n"
    (page)="setCurrentPage($event.pageIndex, $event.pageSize)"
    aria-label="Select page"
    [disabled]="loading"
    showFirstLastButtons
  >
  </mat-paginator>

  <div echarts [options]="chart" class="chart" [loading]="loading"></div>

  <mat-paginator
    [length]="total"
    [pageSize]="limit"
    [pageSizeOptions]="[
      12, 24, 36, 42, 48, 54, 60, 72, 78, 84, 90, 102, 108, 120, 240, 360
    ]"
    [pageIndex]="n"
    (page)="setCurrentPage($event.pageIndex, $event.pageSize)"
    aria-label="Select page"
    [disabled]="loading"
    showFirstLastButtons
  >
  </mat-paginator>
</div>
