<h4 class="header" [hidden]="totalsLoading">
  <span
    ><b>Week Ago:</b> {{ this.totalWeekAgo | currencySpace : this.currency.code :'symbol' }},
  </span>
  <span
    ><b>Current:</b> {{ this.total | currencySpace : this.currency.code :'symbol' }},
  </span>
  <span
    ><b>Delta:</b>
    {{ this.total - this.totalWeekAgo | currencySpace : this.currency.code :'symbol' }}</span
  >
</h4>

<h4 class="header" [hidden]="!totalsLoading">
  <span><b>Loading...</b></span>
</h4>

<ng-template #filter>
  <app-entity-name-filter [entityList]="entityList"></app-entity-name-filter>
  <app-money-type-selector
    [label]="'Available currencies'"
    [disabled]="loading"
    [currencies]="currencies"
    [currency]="currency"
    (currency$)="updateCurrency($event)"
  ></app-money-type-selector>
</ng-template>

<app-entity-list
  #entityList
  [filterTemplate]="filter"
></app-entity-list>
