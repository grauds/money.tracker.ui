<mat-form-field appearance="fill" subscriptSizing="dynamic">
  <mat-label>Global currency</mat-label>
  <mat-select
    [disabled]="loading"
    (valueChange)="onCurrencyChange($event)"
    [value]="currency"
  >
    @for (currency of currencies; track currency) {
      <mat-option [value]="currency">
        {{ currency.name }}
      </mat-option>
    }
  </mat-select>
</mat-form-field>
