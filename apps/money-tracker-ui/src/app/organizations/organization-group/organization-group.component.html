@if (entity) {
  <app-breadcrumbs [path]="path"></app-breadcrumbs>
}
@if (entity) {
  <div>
    <div class="back-area">
      <div class="jumbotron">
        <h2>
          {{ entity ? entity.name : '' }}
        </h2>
        @if (entity.description) {
          <div style="max-height: 350px; margin: 10px; overflow: auto">
            {{ entity ? entity.description : '' }}
          </div>
        }
      </div>
    </div>
    <app-entity-list
    [searchRequest]="{
      queryArguments: getQueryArguments(),
      queryName: 'recursiveByParentId'
    }"
      (loading$)="setLoading($event)"
      (entities$)="setEntities($event)"
      [sort]="getSort()"
    ></app-entity-list>
    @if (!(children && children.length > 0)) {
      <app-organization-group-organizations
        [id]="id"
        >
      </app-organization-group-organizations>
    }
    <div>
      <!--ya-map [center]="[55.751952, 37.600739]" [zoom]="12">
        <ya-placemark [geometry]="[55.751952, 37.600739]"></ya-placemark>
      </ya-map-->
    </div>
  </div>
}
