@if (entity) {
  <app-breadcrumbs [path]="path"></app-breadcrumbs>
}
@if (entity) {
  <div>
    <div class="back-area">
      <div class="jumbotron summary-header">

        <!-- Left Side: Title and Description -->
        <div class="summary-details">
          <h2 style="margin: 0; font-size: 1.75rem; font-weight: 600; color: #212529; letter-spacing: -0.2px;">
            {{ entity ? entity.name : '' }}
          </h2>
        </div>

      </div>
    </div>

    <div>
      <!--ya-map [center]="[55.751952, 37.600739]" [zoom]="12">
        <ya-placemark [geometry]="[55.751952, 37.600739]"></ya-placemark>
      </ya-map-->
    </div>


    <div class="d-flex align-items: center; margin: 32px; padding-left: 12px; border-left: 4px solid #0d6efd;">
      <div>
        <h3 style="margin: 0; font-size: 1.25rem; font-weight: 600; color: #212529; letter-spacing: -0.2px;">
          Group Organizations
        </h3>
        <small style="color: #6c757d; font-size: 0.85rem;">List of this group and subgroups organizations</small>
      </div>
    </div>

    <app-organization-group-organizations
      [id]="id"
    >
    </app-organization-group-organizations>


    @if (this.children && this.children.length > 0) {
      <div class="d-flex align-items: center; margin: 32px; padding-left: 12px; border-left: 4px solid #0d6efd;">
        <div>
          <h3 style="margin: 0; font-size: 1.25rem; font-weight: 600; color: #212529; letter-spacing: -0.2px;">
            Subgroups
          </h3>
          <small style="color: #6c757d; font-size: 0.85rem;">Child groups and some stats (to be updated)</small>
        </div>
      </div>
    }

    <app-entity-list
      [updateRouterState]="false"
      [cookieStateKey]="'organization-group-subgroups'"
      [searchRequest]="{
        queryArguments: getQueryArguments(),
        queryName: 'recursiveByParentId'
      }"
      (loading$)="setLoading($event)"
      (entitiesChange$)="setEntities($event)"
      [sort]="getSort()"
    ></app-entity-list>
  </div>
}
