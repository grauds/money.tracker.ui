@if (entity) {
  <app-breadcrumbs [path]="path"></app-breadcrumbs>
}
@if (entity) {
  <div>
    <div class="back-area">
      <div class="jumbotron summary-header">

        <div class="product-media" style="flex-shrink: 0; background: #ffffff; padding: 12px; border: 1px solid #dee2e6; border-radius: 6px;">
          <app-photo-uploader
            [entityName]="'organizations'"
            [entityId]="id"
            [extraPath]="'main'"
          ></app-photo-uploader>
        </div>

        <div class="ledger-grid">
          <!-- Left Side: Title and Description -->
          <div class="summary-details">
            <h2 style="margin: 0; font-size: 1.75rem; font-weight: 600; color: #212529; letter-spacing: -0.2px;">
              {{ entity ? entity.name : '' }}
            </h2>
          </div>

          <!-- Financial Overview Section -->
          <lib-entity-balance-info
            [loading]="loading"
            [expensesSum]="expensesSum"
            [incomeSum]="incomeSum"
            [currency]="currency"
          ></lib-entity-balance-info>
        </div>
      </div>
    </div>

    <div>
      <!--ya-map [center]="[55.751952, 37.600739]" [zoom]="12">
        <ya-placemark [geometry]="[55.751952, 37.600739]"></ya-placemark>
      </ya-map-->
    </div>

  </div>
}

@if (entity && this.expenses.length > 1) {
  <div class="d-flex align-items: center; margin: 32px; padding-left: 12px; margin-left: 20px; border-left: 4px solid #0d6efd;">
    <div>
      <h3 style="margin: 0 0 0 20px; font-size: 1.25rem; font-weight: 600; color: #212529; letter-spacing: -0.2px;">
        Price & Analytics Trends
      </h3>
      <small style="margin: 0 0 0 20px; color: #6c757d; font-size: 0.85rem;">Historical data and purchase distribution</small>
    </div>
  </div>
}

<app-entity-expenses
  [expenseService]="expenseService"
  [cookieStateKey]="'organization-expense'"
  [queryArguments]="getQueryArguments()"
  [queryName]="'tradeplace'"
  (loadingChanged)="setLoading($event)"
  (entitiesChanged)="setExpenses($event)"
></app-entity-expenses>

@if (entity && this.income.length > 1) {
  <div class="d-flex align-items: center; margin: 32px; padding-left: 12px; border-left: 4px solid #0d6efd;">
    <div>
      <h3 style="margin: 0 0 0 20px;  font-size: 1.25rem; font-weight: 600; color: #212529; letter-spacing: -0.2px;">
        Income & Analytics Trends
      </h3>
      <small style="margin: 0 0 0 20px; color: #6c757d; font-size: 0.85rem;">Historical data and income distribution</small>
    </div>

  </div>
}

<app-entity-income
  [incomeService]="incomeService"
  [cookieStateKey]="'organization-income'"
  [queryArguments]="getQueryArguments()"
  [queryName]="'tradeplace'"
  (loadingChanged)="setLoading($event)"
  (entitiesChanged)="setIncome($event)"
>
</app-entity-income>
