<ng-template #filter>
  @if (filterTemplate) {
    <ng-container *ngTemplateOutlet="filterTemplate"></ng-container>
  }
  <mat-form-field class="full-width-search">
    <mat-label>Search</mat-label>
    <input
      matInput
      id="name"
      (change)="setFilterName($event)"
      [formControl]="name"
      type="text"
      placeholder="in the names"
      autocomplete="off"
      />
    <mat-hint>Start typing, Enter to search</mat-hint>
  </mat-form-field>
</ng-template>

<app-entity-list
  [listTemplate]="listTemplate"
  [tableTemplate]="tableTemplate"
  [thumbnailTemplate]="thumbnailTemplate"
  [currentView]="currentView"
  [filterTemplate]="filter"
  (loading$)="setLoading($event)"
  (filter$)="setFilterListener($event)"
></app-entity-list>
