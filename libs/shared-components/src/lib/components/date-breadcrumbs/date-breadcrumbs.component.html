<div class="breadcrumbs">
  <div class="path-item"><a
    [routerLink]="'/'">
    <mat-icon fontIcon="home">
    </mat-icon>
  </a></div>

  @for (item of path; track item) {
    <div class="path-item">
      <div class="path-divider">&gt;</div>
      @if (item.url) {
        <a
          [routerLink]="item.url"
          class="active-ctrl"
        >
          {{ item.label }}
        </a>
      }
      @if (!item.url) {
        <div>{{ item.label }}</div>
      }
    </div>
  }
</div>
