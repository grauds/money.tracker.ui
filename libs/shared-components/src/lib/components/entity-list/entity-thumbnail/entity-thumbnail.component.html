<div class="thumbnail-card" [ngClass]="{ 'list-layout': currentLayout === 'list' }">

  <div class="image-container">
    @if ((getImageUrl() | authImage | async); as resolvedUrl) {
      <img [src]="resolvedUrl"
           [attr.width]="currentLayout === 'list' ? 60 : 170"
           [attr.height]="currentLayout === 'list' ? 60 : 170"
           alt="Photo"
           class="full-bleed-image"
           (load)="onImageLoad()"
      />
    } @else {
      <img [src]="'assets/coming-soon.png'"
           [attr.width]="currentLayout === 'list' ? 60 : 170"
           [attr.height]="currentLayout === 'list' ? 60 : 170"
           alt="Placeholder"
           class="full-bleed-image placeholder-fallback"
           priority
      />
    }
  </div>

  <span class="thumbnail-name">
    <a routerLink="{{ entityLink }}">{{
        entity ? entity.name : entityLink
      }}</a>
  </span>
</div>
